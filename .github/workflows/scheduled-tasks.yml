name: Scheduled Tasks

# GitHub scheduled workflows only run from the default branch after this file exists there.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-scheduled-task:
    name: Call scheduled endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call keep-render-awake endpoint
        env:
          SCHEDULED_TASK_URL: ${{ secrets.SCHEDULED_TASK_URL }}
          SCHEDULED_TASK_SECRET: ${{ secrets.SCHEDULED_TASK_SECRET }}
          SCHEDULED_TASK_TIMEOUT_SECONDS: ${{ secrets.SCHEDULED_TASK_TIMEOUT_SECONDS }}
        run: |
          if [ -z "$SCHEDULED_TASK_URL" ]; then
            echo "SCHEDULED_TASK_URL is not configured"
            exit 1
          fi

          if [ -z "$SCHEDULED_TASK_SECRET" ]; then
            echo "SCHEDULED_TASK_SECRET is not configured"
            exit 1
          fi

          if [ -z "$SCHEDULED_TASK_TIMEOUT_SECONDS" ]; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS is not configured"
            exit 1
          fi

          if ! echo "$SCHEDULED_TASK_TIMEOUT_SECONDS" | grep -Eq '^[0-9]+$'; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS must be a positive integer"
            exit 1
          fi

          if [ "$SCHEDULED_TASK_TIMEOUT_SECONDS" -le 0 ]; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS must be greater than zero"
            exit 1
          fi

          curl --fail --show-error --silent \
            --max-time "$SCHEDULED_TASK_TIMEOUT_SECONDS" \
            -H "Authorization: Bearer ${SCHEDULED_TASK_SECRET}" \
            "$SCHEDULED_TASK_URL"
