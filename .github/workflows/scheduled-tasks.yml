name: Manual Render Wake Check

# GitHub scheduled workflows only run from the default branch after this file exists there.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-scheduled-task:
    name: Manually call Render health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Manually call Render health endpoint
        env:
          RENDER_API_HEALTH_URL: ${{ secrets.RENDER_API_HEALTH_URL }}
          SCHEDULED_TASK_TIMEOUT_SECONDS: ${{ secrets.SCHEDULED_TASK_TIMEOUT_SECONDS }}
        run: |
          if [ -z "$RENDER_API_HEALTH_URL" ]; then
            echo "RENDER_API_HEALTH_URL is not configured"
            exit 1
          fi

          if [ -z "$SCHEDULED_TASK_TIMEOUT_SECONDS" ]; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS is not configured"
            exit 1
          fi

          if ! echo "$SCHEDULED_TASK_TIMEOUT_SECONDS" | grep -Eq '^[0-9]+$'; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS must be a positive integer"
            exit 1
          fi

          if [ "$SCHEDULED_TASK_TIMEOUT_SECONDS" -le 0 ]; then
            echo "SCHEDULED_TASK_TIMEOUT_SECONDS must be greater than zero"
            exit 1
          fi

          response_file="$(mktemp)"

          status_code="$(curl \
            --location \
            --silent \
            --show-error \
            --connect-timeout 20 \
            --max-time "$SCHEDULED_TASK_TIMEOUT_SECONDS" \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --output "$response_file" \
            --write-out "%{http_code}" \
            "$RENDER_API_HEALTH_URL")"

          echo "HTTP status: ${status_code}"

          if [ -s "$response_file" ]; then
            echo "Response body:"
            head -c 1000 "$response_file"
            echo
          fi

          rm -f "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Render API health check failed"
            exit 1
          fi

          echo "Render API health check completed successfully"
