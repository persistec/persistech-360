name: Manual Render Wake Check

# GitHub scheduled workflows only run from the default branch after this file exists there.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-scheduled-task:
    name: Manually call Render health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call keep-render-awake endpoint
        env:
          RENDER_API_HEALTH_URL: ${{ secrets.RENDER_API_HEALTH_URL }}
          SCHEDULED_TASK_TIMEOUT_SECONDS: ${{ secrets.SCHEDULED_TASK_TIMEOUT_SECONDS || 30 }}
        run: |
          if [ -z "$RENDER_API_HEALTH_URL" ]; then
            echo "RENDER_API_HEALTH_URL is not configured"
            exit 1
          fi

          curl --fail --show-error --silent \
            --max-time "$SCHEDULED_TASK_TIMEOUT_SECONDS" \
            "$RENDER_API_HEALTH_URL"
