name: Web CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-ci.yml'

permissions:
  contents: read

jobs:
  web-ci:
    name: Validate web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
