name: API CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'

permissions:
  contents: read

jobs:
  api-ci:
    name: Validate API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
