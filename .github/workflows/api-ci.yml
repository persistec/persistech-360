name: API CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-ci:
    name: Validate API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39757654ed98286a111a0b51e5138f6b0f9c2d82 # v4.2.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
