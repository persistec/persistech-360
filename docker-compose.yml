services:
  postgres:
    image: postgres:15-alpine
    container_name: persistech-postgres
    environment:
      POSTGRES_DB: persistech_360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d persistech_360']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: persistech-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/persistech_360
      WEB_APP_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # NOTE: No node_modules volume mount — deps are baked into the image at
    # build time. Mounting node_modules as a volume was the root cause of the
    # EACCES error on npx prisma generate.

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: persistech-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
